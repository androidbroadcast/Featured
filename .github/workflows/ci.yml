name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
      - run: >-
          ./gradlew test
          :core:koverVerify
          :datastore-provider:koverVerify
          :sharedpreferences-provider:koverVerify
          :firebase-provider:koverVerify
          :featured-compose:koverVerify
          :featured-registry:koverVerify
          :featured-testing:koverVerify
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/reports/kover/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
      - name: Assemble and Lint
        # :sample is now a KMP library — :androidApp is the application module.
        # Firebase is conditional (checked via file existence), so no google-services.json needed.
        run: ./gradlew assembleDebug lint
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-results
          path: "**/build/reports/lint-results-debug.html"
          if-no-files-found: ignore

  lint:
    name: Lint & API Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
      - run: ./gradlew spotlessCheck
      - name: Check public API
        run: ./gradlew apiCheck

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Cache SwiftLint
        id: cache-swiftlint
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: swiftlint-${{ runner.os }}-${{ hashFiles('.swiftlint.yml') }}

      - name: Install SwiftLint
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint

      - run: swiftlint lint --strict --config .swiftlint.yml

      - name: Link iOS frameworks (all targets)
        # Explicit module prefixes required — root-level task aggregation is not guaranteed
        run: |
          ./gradlew \
            :core:linkDebugFrameworkIosSimulatorArm64 \
            :core:linkDebugFrameworkIosArm64 \
            :core:linkDebugFrameworkIosX64 \
            :datastore-provider:linkDebugFrameworkIosSimulatorArm64 \
            :datastore-provider:linkDebugFrameworkIosArm64 \
            :datastore-provider:linkDebugFrameworkIosX64

      - name: Build Xcode project
        # generic/platform avoids "simulator not found" failures on runners
        # where specific iOS runtime versions are not pre-installed
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
