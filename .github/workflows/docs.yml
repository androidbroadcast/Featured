name: Publish Docs

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build-env

      - name: Generate Dokka HTML
        run: ./gradlew --no-daemon dokkaHtmlMultiModule

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.18

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Embed Dokka output into site/api
        # Runs after mkdocs build so Dokka HTML does not conflict with
        # docs/api/index.md during MkDocs processing.
        run: cp -r build/dokka/htmlMultiModule/. site/api/

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site/
          retention-days: 7

  publish-docs:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    # Only publish on pushes to main or on release tags — not on PRs
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site/

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
