name: Dependency Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # Requires "Dependency graph" enabled in repo Security settings
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
